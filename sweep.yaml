program: src/train.py

method: random


metric:
  name: val_accuracy 
  goal: maximize 

parameters:
  learning_rate:
    values: [0.1, 0.01, 0.001]

  optimizer:
    values: ["sgd", "momentum", "rmsprop","nag"]

  activation:
    values: ["relu", "sigmoid", "tanh"]

  weight_init:
    values: ["random", "xavier"]

  num_layers:
    values: [2, 3,4]

  hidden_size:
    values: [32,64, 128]
  
  loss: 
    values: [mse,cross_entropy]